<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>BOSS SYSTEM - لوحة التحكم العليا</title>
    <style>
        :root { --sidebar-bg: #0f172a; --main-bg: #f8fafc; --accent: #2563eb; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; background: var(--main-bg); }
        .sidebar { width: 260px; background: var(--sidebar-bg); color: white; height: 100vh; padding: 20px; position: fixed; }
        .sidebar h2 { color: #38bdf8; text-align: center; border-bottom: 1px solid #334155; padding-bottom: 20px; }
        .content { margin-right: 260px; padding: 40px; width: 100%; }
        .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-top: 20px; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-maint { background: #ef4444; color: white; }
        .btn-active { background: #22c55e; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid #e2e8f0; }
        th { background: #f1f5f9; color: #475569; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>
    <div class="sidebar">
        <h2>التحكم الكامل</h2>
        <p style="text-align:center;">مرحباً بك يا Boss</p>
        <button onclick="firebase.auth().signOut()" style="width:100%; background:none; border:1px solid #ef4444; color:#ef4444; padding:10px; border-radius:8px; cursor:pointer; margin-top:20px;">خروج آمن</button>
    </div>
    <div class="content">
        <div class="header">
            <h2>لوحة إدارة النظام</h2>
            <button id="maintBtn" class="btn btn-maint" onclick="toggleMaint()">تحميل حالة الصيانة...</button>
        </div>
        
        <div class="card">
            <h3>🏢 إدارة الشركات والاشتراكات</h3>
            <table id="compTable">
                <thead>
                    <tr><th>الشركة</th><th>الحالة</th><th>الإجراء</th></tr>
                </thead>
                <tbody id="compBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const firebaseConfig = { /* نفس الكونفيج بتاعك */
            apiKey: "AIzaSyAVW3uSGg86xGKxeXJ5PSwAYAPYET3sZQ8",
            authDomain: "trackerpro-d090e.firebaseapp.com",
            databaseURL: "https://trackerpro-d090e-default-rtdb.firebaseio.com",
            projectId: "trackerpro-d090e",
            storageBucket: "trackerpro-d090e.firebasestorage.app",
            messagingSenderId: "445130757587",
            appId: "1:445130757587:web:33618cbd508558ab310b26"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // فحص الصلاحية Boss
        firebase.auth().onAuthStateChanged(user => {
            if(user) {
                db.ref('users/'+user.uid).once('value', s => {
                    if(s.val().role !== 'super_admin') window.location.href = 'index.html';
                });
            } else window.location.href = 'index.html';
        });

        // مراقبة الصيانة
        let maintState = false;
        db.ref('system_settings/maintenance').on('value', s => {
            maintState = s.val();
            const btn = document.getElementById('maintBtn');
            btn.textContent = maintState ? "إيقاف الصيانة" : "تشغيل الصيانة العامة";
            btn.style.background = maintState ? "#22c55e" : "#ef4444";
        });

        function toggleMaint() { db.ref('system_settings').update({ maintenance: !maintState }); }

        // مراقبة الشركات
        db.ref('companies').on('value', s => {
            const body = document.getElementById('compBody');
            body.innerHTML = '';
            s.forEach(child => {
                const data = child.val();
                body.innerHTML += `
                    <tr>
                        <td>${data.name}</td>
                        <td style="color:${data.status === 'active' ? 'green' : 'red'}">${data.status === 'active' ? 'نشط' : 'موقف'}</td>
                        <td><button onclick="toggleComp('${child.key}', '${data.status}')">تغيير الحالة</button></td>
                    </tr>
                `;
            });
        });

        function toggleComp(id, status) {
            db.ref('companies/'+id).update({ status: status === 'active' ? 'suspended' : 'active' });
        }
    </script>
</body>
</html>
