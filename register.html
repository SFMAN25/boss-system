<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>انضم لفريق BOSS</title>
    <style>
        :root { --gold: #fbbf24; --glass: rgba(15, 23, 42, 0.9); }
        body { margin:0; background: url('https://files.catbox.moe/n4mjhu.png') center/cover no-repeat fixed; font-family: sans-serif; display:flex; justify-content:center; align-items:center; min-height:100vh; color:white; }
        .card { background: var(--glass); padding:30px; border-radius:20px; width:90%; max-width:400px; border:1px solid var(--gold); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input, select { width:100%; padding:12px; margin:8px 0; border-radius:8px; border:1px solid #334155; background:#0f172a; color:white; box-sizing:border-box; }
        button { width:100%; padding:15px; background:var(--gold); border:none; border-radius:8px; font-weight:bold; cursor:pointer; margin-top:10px; color: black; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:var(--gold); text-align:center;">تسجيل مسوق جديد</h2>
        <input type="text" id="n" placeholder="الاسم الكامل">
        <input type="tel" id="p" placeholder="رقم الهاتف (للدخول)">
        <input type="password" id="s" placeholder="كلمة السر">
        <input type="text" id="a" placeholder="منطقة العمل">
        <select id="wt"><option>فودافون كاش</option><option>إنستا باي</option></select>
        <input type="text" id="wn" placeholder="رقم المحفظة">
        <button onclick="reg()" id="rb">إرسال طلب الانضمام</button>
        <p style="text-align:center; margin-top:15px;">لديك حساب؟ <a href="index.html" style="color: #38bdf8;">سجل دخولك</a></p>
    </div>
    <script>
        const api = 'https://script.google.com/macros/s/AKfycbyOQgrUIdWgOk2pIFV_g5EnpcgEkHSKYRXYRZeIV3Aec5O0uUm4qsZ6TYhtkdl1lCCx/exec';
        async function reg() {
            const data = { Name:document.getElementById('n').value, Phone:document.getElementById('p').value, Password:document.getElementById('s').value, Work_Area:document.getElementById('a').value, Wallet_Type:document.getElementById('wt').value, Wallet_Number:document.getElementById('wn').value };
            if(!data.Name || !data.Phone || !data.Password) return alert("برجاء ملء البيانات الأساسية");
            document.getElementById('rb').innerText = "جاري الإرسال...";
            await fetch(api, { method:'POST', mode:'no-cors', body:JSON.stringify(data) });
            alert("تم إرسال طلبك بنجاح! في انتظار تفعيل المدير.");
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
