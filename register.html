<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>انضم لفريق BOSS</title>
    <style>
        :root { --gold: #fbbf24; --blue: #38bdf8; --glass: rgba(15, 23, 42, 0.85); }
        body { margin: 0; background: url('https://files.catbox.moe/n4mjhu.png') center/cover no-repeat fixed; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: white; }
        .reg-card { background: var(--glass); backdrop-filter: blur(15px); padding: 35px; border-radius: 25px; border: 1px solid rgba(251, 191, 36, 0.3); width: 90%; max-width: 420px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .logo-text { font-size: 28px; font-weight: 900; color: var(--gold); margin-bottom: 5px; text-shadow: 0 0 15px rgba(251, 191, 36, 0.5); }
        input, select { width: 100%; padding: 14px; margin: 10px 0; background: rgba(15, 23, 42, 0.7); border: 1px solid #334155; border-radius: 12px; color: white; font-size: 15px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus, select:focus { border-color: var(--gold); }
        button { width: 100%; padding: 16px; background: linear-gradient(45deg, var(--gold), #d97706); border: none; border-radius: 12px; color: #000; font-weight: 800; font-size: 17px; cursor: pointer; margin-top: 20px; transition: 0.4s; }
        button:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(217, 119, 6, 0.4); }
    </style>
</head>
<body>
    <div class="reg-card">
        <div class="logo-text">BOSS SYSTEM</div>
        <p style="margin-bottom: 25px; opacity: 0.8;">تسجيل المسوقين الجدد</p>
        
        <input type="text" id="regName" placeholder="الاسم بالكامل" required>
        <input type="tel" id="regPhone" placeholder="رقم الهاتف (للدخول)" required>
        <input type="password" id="regPass" placeholder="أنشئ كلمة سر قوية" required>
        <input type="text" id="regArea" placeholder="منطقة العمل (مثال: السيوف)">
        
        <select id="walletType" required>
            <option value="">اختر وسيلة استلام الأرباح</option>
            <option value="فودافون كاش">فودافون كاش</option>
            <option value="أورنج كاش">أورنج كاش</option>
            <option value="اتصالات كاش">اتصالات كاش</option>
            <option value="وي كاش">وي كاش</option>
            <option value="انستا باي">انستا باي</option>
        </select>
        <input type="text" id="walletNum" placeholder="رقم المحفظة أو الحساب">
        
        <button onclick="registerUser()" id="regBtn">إنشاء حسابي بنجاح</button>
        <p style="font-size: 13px; margin-top: 20px;">لديك حساب بالفعل؟ <a href="login.html" style="color: var(--blue); text-decoration: none; font-weight: bold;">سجل دخولك</a></p>
    </div>

    <script>
        async function registerUser() {
            const btn = document.getElementById('regBtn');
            const userData = {
                Name: document.getElementById('regName').value,
                Phone: document.getElementById('regPhone').value,
                Password: document.getElementById('regPass').value,
                Work_Area: document.getElementById('regArea').value,
                Wallet_Type: document.getElementById('walletType').value,
                Wallet_Number: document.getElementById('walletNum').value
            };

            if(!userData.Name || !userData.Phone || !userData.Password) {
                alert("يا بطل، برجاء إكمال البيانات الأساسية!"); return;
            }

            btn.innerText = "جاري الحفظ أوتوماتيكياً...";
            btn.disabled = true;

            try {
                // رابط جوجل سكربت الخاص بك
                await fetch('https://script.google.com/macros/s/AKfycbwIyxtO1oy9IblAWqppLTgYmDz72RtsclYJmmE-bh98br-YRKWcn9XTQBflxf-_UO4T/exec', {
    method: 'POST',
    mode: 'no-cors',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(userData)
});
                
                alert("✅ تم التسجيل بنجاح! سيتم مراجعة بياناتك من قبل الإدارة.");
                window.location.href = 'login.html';
            } catch(e) {
                alert("❌ حدث خطأ، تأكد من اتصالك بالإنترنت");
                btn.innerText = "إنشاء حسابي بنجاح";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
