<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب مسوق جديد - BOSS SYSTEM</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

    <div class="auth-container">
        <h2>تسجيل مسوق جديد</h2>
        <div id="errorMessage" class="alert alert-danger"></div>
        <div id="successMessage" class="alert alert-success"></div>

        <form id="registerForm">
            <div class="form-group">
                <label for="fullName">الاسم بالكامل</label>
                <input type="text" id="fullName" required placeholder="مثال: محمد أحمد">
            </div>
            <div class="form-group">
                <label for="companyId">كود الشركة المنضم إليها</label>
                <input type="text" id="companyId" required placeholder="مثال: comp_01">
            </div>
            <div class="form-group">
                <label for="email">البريد الإلكتروني</label>
                <input type="email" id="email" required placeholder="marketer@mail.com">
            </div>
            <div class="form-group">
                <label for="password">كلمة المرور</label>
                <input type="password" id="password" required placeholder="لا تقل عن 6 أحرف">
            </div>
            <button type="submit" class="btn-block">إنشاء الحساب والربط</button>
        </form>
        <p style="text-align: center; margin-top: 15px; font-size: 14px;">
            لديك حساب بالفعل؟ <a href="index.html">تسجيل الدخول</a>
        </p>
    </div>

    <script>
        // إعدادات مشروع TrackerPro الحقيقية الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyAVW3uSGg86xGKxeXJ5PSwAYAPYET3sZQ8",
            authDomain: "trackerpro-d090e.firebaseapp.com",
            databaseURL: "https://trackerpro-d090e-default-rtdb.firebaseio.com",
            projectId: "trackerpro-d090e",
            storageBucket: "trackerpro-d090e.firebasestorage.app",
            messagingSenderId: "445130757587",
            appId: "1:445130757587:web:33618cbd508558ab310b26",
            measurementId: "G-RJ22T0PWGS"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('fullName').value.trim();
            const companyId = document.getElementById('companyId').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            const errDiv = document.getElementById('errorMessage');
            const succDiv = document.getElementById('successMessage');

            errDiv.style.display = 'none';
            succDiv.style.display = 'none';

            // إنشاء المستخدم برمجياً في Firebase Auth
            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    const uid = userCredential.user.uid;

                    // حفظ وحقن بيانات المسوق الإضافية في عقدة الـ Realtime Database المصلحة
                    return database.ref('users/' + uid).set({
                        name: name,
                        email: email,
                        company_id: companyId,
                        role: 'marketer',
                        created_at: firebase.database.ServerValue.TIMESTAMP
                    });
                })
                .then(() => {
                    succDiv.textContent = "تم إنشاء الحساب وربطه بالداتابيز بنجاح! جاري التوجيه...";
                    succDiv.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = 'user-dash.html';
                    }, 1500);
                })
                .catch((error) => {
                    // معالجة الأخطاء وعرضها للمستخدم بشكل واضح
                    errDiv.textContent = error.message;
                    errDiv.style.display = 'block';
                });
        });
    </script>
</body>
</html>
