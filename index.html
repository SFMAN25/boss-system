<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دخول BOSS SYSTEM</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; font-family: 'Segoe UI', sans-serif; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); width: 100%; max-width: 400px; text-align: center; }
        .login-card h2 { color: #0f172a; margin-bottom: 30px; font-size: 28px; }
        .form-group { margin-bottom: 20px; text-align: right; }
        .form-group label { display: block; margin-bottom: 8px; color: #475569; font-weight: 600; }
        .form-group input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; outline: none; transition: 0.3s; }
        .form-group input:focus { border-color: #2563eb; }
        .btn-login { width: 100%; padding: 14px; background: #2563eb; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-login:hover { background: #1d4ed8; transform: translateY(-2px); }
        .error-msg { color: #ef4444; font-size: 14px; margin-top: 15px; display: none; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>
    <div class="login-card">
        <h2>BOSS SYSTEM</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="email" required placeholder="admin@boss.com">
            </div>
            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-login">تسجيل الدخول</button>
            <div id="errorBox" class="error-msg"></div>
        </form>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAVW3uSGg86xGKxeXJ5PSwAYAPYET3sZQ8",
            authDomain: "trackerpro-d090e.firebaseapp.com",
            databaseURL: "https://trackerpro-d090e-default-rtdb.firebaseio.com",
            projectId: "trackerpro-d090e",
            storageBucket: "trackerpro-d090e.firebasestorage.app",
            messagingSenderId: "445130757587",
            appId: "1:445130757587:web:33618cbd508558ab310b26"
        };
        firebase.initializeApp(firebaseConfig);

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorBox = document.getElementById('errorBox');

            firebase.auth().signInWithEmailAndPassword(email, password)
            .then((userCredential) => {
                const uid = userCredential.user.uid;
                // فحص الرتبة والتوجيه
                firebase.database().ref('users/' + uid).once('value').then((snap) => {
                    const role = snap.val().role;
                    if(role === 'super_admin') window.location.href = 'admin-dash.html';
                    else if(role === 'company_admin') window.location.href = 'company-dash.html';
                    else if(role === 'marketer') window.location.href = 'user-dash.html';
                    else alert("رتبة غير معروفة!");
                });
            })
            .catch(err => {
                errorBox.style.display = 'block';
                errorBox.textContent = "خطأ في البيانات أو الصلاحيات";
            });
        });
    </script>
</body>
</html>
