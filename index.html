<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول BOSS</title>
    <style>
        :root { --gold: #fbbf24; --glass: rgba(15, 23, 42, 0.85); }
        body { margin: 0; background: url('https://files.catbox.moe/x4wlsm.png') center/cover no-repeat fixed; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: white; }
        .card { background: var(--glass); backdrop-filter: blur(15px); padding: 40px; border-radius: 20px; width: 90%; max-width: 380px; text-align: center; border: 1px solid rgba(251, 191, 36, 0.3); }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--gold); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: black; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color: var(--gold);">تسجيل الدخول</h2>
        <input type="tel" id="p" placeholder="رقم الهاتف">
        <input type="password" id="s" placeholder="كلمة السر">
        <button onclick="login()" id="btn">دخول</button>
        <p style="margin-top:20px;">ليس لديك حساب؟ <a href="register.html" style="color:#38bdf8;">سجل كمسوق</a></p>
    </div>
    <script>
        const api = 'https://script.google.com/macros/s/AKfycbyOQgrUIdWgOk2pIFV_g5EnpcgEkHSKYRXYRZeIV3Aec5O0uUm4qsZ6TYhtkdl1lCCx/exec';
        async function login() {
            const phone = document.getElementById('p').value, pass = document.getElementById('s').value, btn = document.getElementById('btn');
            if(!phone || !pass) return alert('أدخل البيانات');
            btn.innerText = "جاري التحقق...";
            try {
                const res = await fetch(api);
                const users = await res.json();
                const u = users.find(x => x.Phone == phone && x.Password == pass);
                if(u) {
                    if(u.Status === "Active") {
                        localStorage.setItem('boss_user', JSON.stringify(u));
                        window.location.href = 'user-dash.html';
                    } else { alert("حسابك في انتظار تفعيل المدير.."); }
                } else { alert("خطأ في الهاتف أو كلمة السر"); }
            } catch(e) { alert("خطأ في الاتصال بالخادم"); }
            btn.innerText = "دخول";
        }
    </script>
</body>
</html>
