<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - BOSS SYSTEM</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

    <div class="auth-container">
        <h2>تسجيل دخول السيستم</h2>
        <div id="errorMessage" class="alert alert-danger"></div>
        <div id="successMessage" class="alert alert-success"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">البريد الإلكتروني</label>
                <input type="email" id="email" required placeholder="name@company.com">
            </div>
            <div class="form-group">
                <label for="password">كلمة المرور</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-block">دخول الآمن</button>
        </form>
        <p style="text-align: center; margin-top: 15px; font-size: 14px;">
            ليس لديك حساب مسوق؟ <a href="register.html">سجل حساب جديد هنا</a>
        </p>
    </div>

    <script>
        // تكوين الفايربيز الخاص بمشروعك (استبدله ببيانات مشروعك TrackerPro)
        const firebaseConfig = {
            apiKey: "AIzaSyYourKeyHere...",
            authDomain: "trackerpro-d090e.firebaseapp.com",
            databaseURL: "https://trackerpro-d090e-default-rtdb.firebaseio.com",
            projectId: "trackerpro-d090e",
            storageBucket: "trackerpro-d090e.appspot.com",
            messagingSenderId: "1234567890",
            appId: "1:12345:web:12345"
        };
        
        // تهيئة الفايربيز
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const database = firebase.database();

        // معالجة إرسال النموذج لقراءة البيانات والتحقق
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errDiv = document.getElementById('errorMessage');
            const succDiv = document.getElementById('successMessage');

            errDiv.style.display = 'none';
            succDiv.style.display = 'none';

            // تسجيل الدخول بالفايربيز
            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    const uid = userCredential.user.uid;
                    succDiv.textContent = "تم التحقق، جاري فحص الصلاحيات...";
                    succDiv.style.display = 'block';

                    // فحص دور المستخدم في قاعدة البيانات المصلحة
                    database.ref('users/' + uid).once('value')
                        .then((snapshot) => {
                            if (snapshot.exists()) {
                                const userData = snapshot.val();
                                const role = userData.role;

                                // التوجيه حسب الرول البرمجي المعتمد
                                if (role === 'super_admin' || role === 'company_admin') {
                                    window.location.href = 'admin-dash.html';
                                } else {
                                    window.location.href = 'user-dash.html';
                                }
                            } else {
                                throw new Error("لم يتم العثور على صلاحيات لهذا الحساب.");
                            }
                        }).catch((err) => {
                            errDiv.textContent = err.message;
                            errDiv.style.display = 'block';
                            auth.signOut();
                        });
                })
                .catch((error) => {
                    // معالجة الأخطاء الشائعة برمجياً
                    if(error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                        errDiv.textContent = "البريد الإلكتروني أو كلمة المرور غير صحيحة.";
                    } else {
                        errDiv.textContent = error.message;
                    }
                    errDiv.style.display = 'block';
                });
        });
    </script>
</body>
</html>
