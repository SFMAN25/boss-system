<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول الموظفين | BOSS SYSTEM</title>
    <style>
        :root { --gold: #fbbf24; --blue: #38bdf8; --glass: rgba(15, 23, 42, 0.85); }
        body { margin: 0; background: url('https://files.catbox.moe/n4mjhu.png') center/cover no-repeat fixed; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: white; }
        
        .login-card { background: var(--glass); backdrop-filter: blur(15px); padding: 40px; border-radius: 30px; border: 1px solid rgba(251, 191, 36, 0.3); width: 90%; max-width: 380px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        .logo { font-size: 32px; font-weight: 900; color: var(--gold); text-shadow: 0 0 15px rgba(251, 191, 36, 0.5); margin-bottom: 10px; }
        
        input { width: 100%; padding: 15px; margin: 12px 0; background: rgba(15, 23, 42, 0.7); border: 1px solid #334155; border-radius: 15px; color: white; font-size: 16px; transition: 0.3s; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(251, 191, 36, 0.2); }

        button { width: 100%; padding: 16px; background: linear-gradient(45deg, var(--gold), #d97706); border: none; border-radius: 15px; color: #000; font-weight: 800; font-size: 17px; cursor: pointer; margin-top: 20px; transition: 0.4s; }
        button:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(217, 119, 6, 0.3); }

        .links { margin-top: 25px; font-size: 14px; }
        .links a { color: var(--blue); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">BOSS SYSTEM</div>
        <p style="opacity: 0.8; margin-bottom: 30px;">لوحة تحكم المسوقين</p>
        
        <input type="tel" id="uPhone" placeholder="رقم الهاتف المسجل">
        <input type="password" id="uPass" placeholder="كلمة السر">
        
        <button onclick="checkUser()" id="logBtn">دخول لوحة التحكم</button>
        
        <div class="links">
            ليس لديك حساب؟ <a href="register.html">انضم إلينا الآن</a>
        </div>
    </div>

    <script>
     async function userLogin() {
    const phone = document.getElementById('uPhone').value;
    const pass = document.getElementById('uPass').value;
    const btn = document.getElementById('logBtn');

    if(!phone || !pass) { alert("يا بطل، كمل بياناتك الأول!"); return; }

    btn.innerText = "جاري التحقق أوتوماتيكياً...";
    btn.disabled = true;

    try {
        // الرابط الجديد بتاعك (جوجل سكريبت)
        const response = await fetch('https://script.google.com/macros/s/AKfycbwIyxtO1oy9IblAWqppLTgYmDz72RtsclYJmmE-bh98br-YRKWcn9XTQBflxf-_UO4T/exec');
        const allUsers = await response.json();
        
        // بيدور على الموظف برقم تليفونه والباسورد
        const user = allUsers.find(u => u.Phone == phone && u.Password == pass);

        if(user) {
            if(user.Status === "Active") {
                localStorage.setItem('boss_user', JSON.stringify(user));
                window.location.href = 'user-dash.html'; // هيدخلك اللوحة
            } else {
                alert("⚠️ حسابك لسه قيد المراجعة.. غير الحالة لـ Active في الشيت!");
                resetBtn();
            }
        } else {
            alert("❌ الرقم أو كلمة السر غلط!");
            resetBtn();
        }
    } catch(e) {
        alert("حدث خطأ في الاتصال بالسيرفر الجديد");
        resetBtn();
    }
}

function resetBtn() {
    const btn = document.getElementById('logBtn');
    btn.innerText = "دخول لوحة التحكم";
    btn.disabled = false;

        }
    </script>
</body>
</html>
