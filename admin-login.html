<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>BOSS LOGIN | الإدارة</title>
    <style>
        :root { --gold: #fbbf24; }
        body { margin: 0; background: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; }
        .login-box { background: #1e293b; padding: 40px; border-radius: 15px; border-top: 5px solid var(--gold); width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--gold); border: none; font-weight: bold; cursor: pointer; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 style="color: var(--gold);">منطقة الـ BOSS</h2>
        <input type="text" id="adminUser" placeholder="اسم المستخدم">
        <input type="password" id="adminPass" placeholder="كلمة السر">
        <button onclick="adminLogin()">دخول الإدارة</button>
    </div>

    <script>
        function adminLogin() {
            const user = document.getElementById('adminUser').value;
            const pass = document.getElementById('adminPass').value;

            if(user === 'BOSS' && pass === '01285577074ay') {
                sessionStorage.setItem('isAdmin', 'true');
                window.location.href = 'admin-dash.html';
            } else {
                alert('بيانات الدخول خاطئة!');
            }
        }
    </script>
</body>
</html>
