<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المسوق - BOSS SYSTEM</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

    <div class="dashboard-wrapper">
        <div class="sidebar">
            <h3>لوحة المسوق</h3>
            <a href="#" class="active">الرئيسية</a>
            <a href="#">التقارير المالية</a>
            <a href="#" id="logoutBtn" style="color: #ef4444; margin-top: 50px;">تسجيل الخروج</a>
        </div>

        <div class="main-content">
            <div class="header-dash">
                <h2 id="welcomeMsg">أهلاً بك...</h2>
                <div id="userCompany" style="font-weight: bold; color: #475569;">الشركة: --</div>
            </div>

            <div class="card-grid">
                <div class="card">
                    <h4>إجمالي المبيعات</h4>
                    <p id="totalSales">0</p>
                </div>
                <div class="card">
                    <h4>العمولات المعلقة</h4>
                    <p id="pendingComm">0 EGP</p>
                </div>
                <div class="card">
                    <h4>العمولات المدفوعة</h4>
                    <p id="paidComm">0 EGP</p>
                </div>
            </div>

            <h3>آخر العمليات والطلبات المسجلة</h3>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>رقم العملية</th>
                        <th>المنتج</th>
                        <th>المبلغ</th>
                        <th>الحالة</th>
                    </tr>
                </thead>
                <tbody id="actionsLogs">
                    <tr>
                        <td colspan="4" style="text-align: center; color: #94a3b8;">لا توجد عمليات مسجلة للأن.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // إعدادات مشروع TrackerPro الحقيقية الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyAVW3uSGg86xGKxeXJ5PSwAYAPYET3sZQ8",
            authDomain: "trackerpro-d090e.firebaseapp.com",
            databaseURL: "https://trackerpro-d090e-default-rtdb.firebaseio.com",
            projectId: "trackerpro-d090e",
            storageBucket: "trackerpro-d090e.firebasestorage.app",
            messagingSenderId: "445130757587",
            appId: "1:445130757587:web:33618cbd508558ab310b26",
            measurementId: "G-RJ22T0PWGS"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // جدار حماية الصفحة للتأكد من هوية المسوق وصلاحياته
        auth.onAuthStateChanged((user) => {
            if (user) {
                database.ref('users/' + user.uid).once('value')
                    .then((snapshot) => {
                        if(snapshot.exists() && snapshot.val().role === 'marketer') {
                            const data = snapshot.val();
                            document.getElementById('welcomeMsg').textContent = "أهلاً بك، " + data.name;
                            document.getElementById('userCompany').textContent = "كود الشركة المربوطة: " + data.company_id;
                        } else {
                            // طرد أو تحويل الحساب لو حاول الدخول بدون رول مسوق صحيح
                            window.location.href = 'index.html';
                        }
                    }).catch(() => {
                        window.location.href = 'index.html';
                    });
            } else {
                window.location.href = 'index.html';
            }
        });

        // تفعيل زر تسجيل الخروج الآمن
        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            auth.signOut().then(() => { window.location.href = 'index.html'; });
        });
    </script>
</body>
</html>
