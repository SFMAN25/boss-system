<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة المسوق</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f1f5f9; }
        .navbar { background: #2563eb; color: white; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; }
        .container { padding: 40px; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .stat-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .stat-card h3 { color: #64748b; margin: 0; font-size: 16px; }
        .stat-card p { font-size: 32px; font-weight: bold; margin: 10px 0; color: #1e293b; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.98); color: white; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>
    <div id="maintOverlay" class="overlay"><h1>🛠️ صيانة دورية</h1><p>نعتذر، السيستم في مرحلة تحديث حالياً.</p></div>
    <div id="payOverlay" class="overlay"><h1>🛑 الحساب معلق</h1><p>برجاء مراجعة الإدارة لتفعيل حساب الشركة.</p></div>

    <div class="navbar">
        <h2 id="userName">المسوق</h2>
        <button onclick="firebase.auth().signOut()" style="background:white; color:#2563eb; border:none; padding:8px 20px; border-radius:8px; cursor:pointer;">خروج</button>
    </div>

    <div class="container">
        <div class="stat-card"><h3>إجمالي المبيعات</h3><p id="sales">0</p></div>
        <div class="stat-card"><h3>الأرباح المدفوعة</h3><p id="profits">0</p></div>
        <div class="stat-card"><h3>العمولات المعلقة</h3><p>0</p></div>
    </div>

    <script>
        const firebaseConfig = { /* نفس الكونفيج بتاعك */
            apiKey: "AIzaSyAVW3uSGg86xGKxeXJ5PSwAYAPYET3sZQ8",
            authDomain: "trackerpro-d090e.firebaseapp.com",
            databaseURL: "https://trackerpro-d090e-default-rtdb.firebaseio.com",
            projectId: "trackerpro-d090e",
            storageBucket: "trackerpro-d090e.firebasestorage.app",
            messagingSenderId: "445130757587",
            appId: "1:445130757587:web:33618cbd508558ab310b26"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        firebase.auth().onAuthStateChanged(user => {
            if(user) {
                // مراقبة بيانات المسوق والصيانة والشركة لايف
                db.ref('system_settings/maintenance').on('value', s => {
                    document.getElementById('maintOverlay').style.display = s.val() ? 'flex' : 'none';
                });

                db.ref('users/'+user.uid).on('value', s => {
                    const data = s.val();
                    if(data.role !== 'marketer') window.location.href = 'index.html';
                    
                    document.getElementById('userName').textContent = data.name;
                    document.getElementById('sales').textContent = data.total_sales || 0;
                    document.getElementById('profits').textContent = data.total_profits || 0;

                    // فحص حالة الشركة
                    db.ref('companies/'+data.company_id+'/status').on('value', ss => {
                        document.getElementById('payOverlay').style.display = ss.val() === 'suspended' ? 'flex' : 'none';
                    });
                });
            } else window.location.href = 'index.html';
        });
    </script>
</body>
</html>
