<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | BOSS SYSTEM</title>
    <style>
        :root { --gold: #fbbf24; --blue: #38bdf8; --glass: rgba(15, 23, 42, 0.85); }
        body { margin: 0; background: url('https://files.catbox.moe/n4mjhu.png') center/cover no-repeat fixed; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: white; }
        .login-card { background: var(--glass); backdrop-filter: blur(15px); padding: 40px; border-radius: 25px; border: 1px solid rgba(251, 191, 36, 0.3); width: 90%; max-width: 380px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 14px; margin: 12px 0; background: rgba(15, 23, 42, 0.7); border: 1px solid #334155; border-radius: 12px; color: white; outline: none; box-sizing: border-box; }
        input:focus { border-color: var(--gold); }
        button { width: 100%; padding: 15px; background: linear-gradient(45deg, var(--gold), #d97706); border: none; border-radius: 12px; color: #000; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 16px; }
        .loading-dots:after { content: ' .'; animation: dots 1.5s infinite; }
        @keyframes dots { 0%, 20% { content: ' .'; } 40% { content: ' ..'; } 60% { content: ' ...'; } }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 style="color: var(--gold); margin-bottom: 5px;">BOSS SYSTEM</h2>
        <p style="opacity: 0.8; margin-bottom: 25px;">دخول الموظفين</p>
        
        <input type="tel" id="userPhone" placeholder="رقم الهاتف المسجل">
        <input type="password" id="userPass" placeholder="كلمة السر">
        
        <button onclick="attemptLogin()" id="logBtn">دخول لوحة التحكم</button>
        
        <p style="font-size: 13px; margin-top: 20px;">ليس لديك حساب؟ <a href="register.html" style="color: var(--blue); text-decoration: none;">سجل الآن</a></p>
    </div>

    <script>
        function attemptLogin() {
            const phone = document.getElementById('userPhone').value;
            const pass = document.getElementById('userPass').value;
            const btn = document.getElementById('logBtn');

            if(!phone || !pass) { alert('برجاء إدخال البيانات كاملة'); return; }

            btn.innerHTML = 'جاري التحقق <span class="loading-dots"></span>';
            btn.disabled = true;

            // البحث في الشيت عن الرقم والباسورد معاً
            fetch(`https://sheetdb.io/api/v1/uvhb8vxlpe7ve/search?Phone=${phone}&Password=${pass}`)
            .then(res => res.json())
            .then(data => {
                if (data.length > 0) {
                    const user = data[0];
                    if (user.Status === "Active") {
                        // حفظ بيانات المستخدم في المتصفح للدخول لاحقاً
                        localStorage.setItem('boss_user', JSON.stringify(user));
                        window.location.href = 'user-dash.html'; // التوجه لصفحة الموظف وليس الإدارة
                    } else {
                        alert('⚠️ حسابك قيد المراجعة من الإدارة. سيتم تفعيلك قريباً.');
                        btn.innerText = 'دخول لوحة التحكم';
                        btn.disabled = false;
                    }
                } else {
                    alert('❌ بيانات الدخول غير صحيحة!');
                    btn.innerText = 'دخول لوحة التحكم';
                    btn.disabled = false;
                }
            })
            .catch(() => {
                alert('خطأ في الاتصال بالسيرفر');
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
